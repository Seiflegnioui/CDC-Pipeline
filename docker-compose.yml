services:
  # ── MongoDB 6.x ── Single-node Replica Set "rs0" ──────────────────────
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    hostname: mongodb
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-appdb}
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/scripts/init-mongo.js:ro
    networks:
      - cdc-net
    healthcheck:
      test: mongosh --quiet --eval "db.adminCommand('ping').ok" | grep -q 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── Kafka 3.6 (KRaft — no dependency on any external coordinator) ─────
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    hostname: kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - cdc-net
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # ── Kafka Connect 3.6 + Debezium MongoDB plugin ──────────────────────
  kafka-connect:
    image: debezium/connect:2.5
    container_name: kafka-connect
    hostname: kafka-connect
    ports:
      - "${CONNECT_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      REST_ADVERTISED_HOST_NAME: kafka-connect
      REST_PORT: 8083
      GROUP_ID: cdc-connect-cluster
      CONFIG_STORAGE_TOPIC: _connect-configs
      OFFSET_STORAGE_TOPIC: _connect-offsets
      STATUS_STORAGE_TOPIC: _connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      PLUGIN_PATH: /kafka/connect
    command:
      - bash
      - -c
      - |
        echo "Launching Kafka Connect..."
        /docker-entrypoint.sh start
    volumes:
      - ./connectors/elasticsearch/elasticsearch-connector-for-apache-kafka-7.0.0:/kafka/connect/elasticsearch
    networks:
      - cdc-net
    depends_on:
      kafka:
        condition: service_started
    healthcheck:
      test: >
        curl -sf http://localhost:8083/connectors > /dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ── Elasticsearch 8.x (security disabled) ─────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    hostname: elasticsearch
    ports:
      - "${ES_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - cdc-net
    healthcheck:
      test: curl -sf http://localhost:9200/_cluster/health > /dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Kibana 8.x ────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    hostname: kibana
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - cdc-net
    depends_on:
      elasticsearch:
        condition: service_started
    healthcheck:
      test: curl -sf http://localhost:5601/api/status > /dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── Kafka UI ──────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    hostname: kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cdc-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: cdc-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    networks:
      - cdc-net
    depends_on:
      kafka:
        condition: service_started
    healthcheck:
      test: curl -sf http://localhost:8080/api/clusters > /dev/null 2>&1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mongodb_data:
    name: cdc_mongodb_data
  kafka_data:
    name: cdc_kafka_data
  es_data:
    name: cdc_es_data
  connect_plugins:
    name: cdc_connect_plugins

networks:
  cdc-net:
    name: cdc-network
    driver: bridge
